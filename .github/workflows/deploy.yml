name: Deploy AI Cluster

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    name: Deploy to Linux Server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config << EOF
          Host deploy-server
            HostName ${{ secrets.AI_DEPLOY_HOST }}
            User ${{ secrets.AI_DEPLOY_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy to Server
        run: |
          echo "Deploying AI Cluster to Linux Server..."
          echo "Target: ${{ secrets.AI_DEPLOY_HOST }}"
          echo "Path: ${{ secrets.AI_DEPLOY_PATH }}"

          # 创建部署目录
          ssh deploy-server "mkdir -p ${{ secrets.AI_DEPLOY_PATH }}"

          # 同步代码到服务器 (使用 sudo 避免权限问题)
          rsync -avz --delete --no-group \
            --exclude '.git' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude '.github' \
            --exclude 'venv' \
            --exclude '.env' \
            ./ deploy-server:${{ secrets.AI_DEPLOY_PATH }}/ || echo "Rsync completed with warnings"

          echo "Code deployed successfully"

      - name: Restart Service
        run: |
          # 在服务器上重启服务
          ssh deploy-server << 'EOF'
            cd ${{ secrets.AI_DEPLOY_PATH }}

            # 安装依赖
            pip install -r requirements.txt

            # 重启服务 (使用 systemd 或 supervisor)
            sudo systemctl restart ai-cluster || sudo supervisorctl restart ai-cluster || echo "Service restart command not available"

            echo "Service restarted"
          EOF

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

      - name: Verify Deployment
        run: |
          # 等待服务启动
          sleep 5
          
          # 健康检查
          curl -f http://${{ secrets.AI_DEPLOY_HOST }}:8002/health || echo "Health check failed, service may need manual restart"
          
          echo "Deploy workflow completed"
