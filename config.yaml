# 星轨智库配置文件
# 环境变量 (BRAIN_*, DEEPSEEK_*, MILVUS_*, REDIS_*, PG_*, JWT_*) 会覆盖此处值

debug: false
log_level: INFO

server:
  host: "0.0.0.0"
  port: 8792

cors:
  origins: ["*"]

llm:
  api_key: ""                  # 从 DEEPSEEK_API_KEY 环境变量读取
  base_url: "https://api.deepseek.com/v1"
  model: "deepseek-chat"
  max_tokens: 4096
  temperature: 0.7

embedding:
  model: "BAAI/bge-m3"
  dim: 1024
  device: "cpu"

milvus:
  uri: "http://127.0.0.1:19530"
  collection: "brain_knowledge"

redis:
  host: "127.0.0.1"
  port: 6379
  password: ""                 # 从 REDIS_PASSWORD 环境变量读取
  db: 2

postgresql:
  host: "127.0.0.1"
  port: 5432
  user: "cs_admin"
  password: ""                 # 从 PG_PASSWORD 环境变量读取
  database: "brain_db"

auth:
  jwt_secret: ""               # 从 JWT_SECRET 环境变量读取
  jwt_algorithm: "HS256"
  access_token_expire_minutes: 120

brain:
  chunk_size: 512
  chunk_overlap: 128
  search_top_k: 20
  dedup_threshold: 0.98
  memory_consolidation_interval_hours: 24
  max_concepts_per_ingest: 10
